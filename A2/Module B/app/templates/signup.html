<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickBites Sign Up</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        .signup-card {
            width: min(780px, 100%);
        }

        .signup-card #signup-form {
            width: 100%;
            max-width: 100%;
        }

        .signup-card .signup-section {
            width: 100%;
            max-width: 100%;
            overflow-x: clip;
        }

        .signup-card .signup-section input,
        .signup-card .signup-section select,
        .signup-card .signup-section button {
            width: 100%;
            max-width: 100%;
        }

        .signup-card .restaurant-map-controls {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
        }

        .signup-card .restaurant-map-controls button {
            width: auto;
            min-width: 180px;
        }

        .signup-card .restaurant-location-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: 0.75rem;
        }

        @media (max-width: 640px) {
            .signup-card .restaurant-location-grid {
                grid-template-columns: 1fr;
            }

            .signup-card .restaurant-map-controls button {
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>

    <header class="hero">
        <h1>QuickBites</h1>
        <p>Create a new account to join the platform.</p>
    </header>

    <main class="layout">
        <section class="card auth-card signup-card">
            <h2>Sign Up</h2>
            <form id="signup-form">
                <label>Sign Up As</label>
                <select id="signup-as" required>
                    <option value="" selected disabled>Select account type</option>
                    <option value="Member">Member</option>
                    <option value="DeliveryPartner">Delivery Agent</option>
                    <option value="Restaurant">Restaurant</option>
                </select>

                <div id="signup-member-fields" class="signup-section hidden">
                    <label>Name</label>
                    <input type="text" id="signup-member-name" placeholder="full name" />
                    <label>Email</label>
                    <input type="email" id="signup-member-email" placeholder="email" />
                    <label>Password</label>
                    <input type="password" id="signup-member-password" placeholder="password" />
                    <label>Phone Number</label>
                    <input type="text" id="signup-member-phone" placeholder="10-digit phone" maxlength="10" />
                </div>

                <div id="signup-delivery-fields" class="signup-section hidden">
                    <label>Vehicle Number</label>
                    <input type="text" id="signup-delivery-vehicle" placeholder="vehicle number" />
                    <label>License ID</label>
                    <input type="text" id="signup-delivery-license" placeholder="license id" />
                    <label>Date of Birth</label>
                    <input type="date" id="signup-delivery-dob" />
                    <button type="button" id="signup-detect-delivery-location" class="btn-secondary">Use My Current Location</button>
                    <input type="hidden" id="signup-delivery-lat" />
                    <input type="hidden" id="signup-delivery-lng" />
                    <p id="signup-delivery-location-text" class="hint">Location not detected yet.</p>
                    <label class="check"><input type="checkbox" id="signup-delivery-online" /> Is Online</label>
                </div>

                <div id="signup-restaurant-fields" class="signup-section hidden">
                    <label>Restaurant Name</label>
                    <input type="text" id="signup-restaurant-name" placeholder="restaurant name" />
                    <label>Contact Phone</label>
                    <input type="text" id="signup-restaurant-phone" placeholder="contact phone" maxlength="10" />
                    <label>Restaurant Email</label>
                    <input type="email" id="signup-restaurant-email" placeholder="restaurant email" />
                    <label>Password</label>
                    <input type="password" id="signup-restaurant-password" placeholder="password" />
                    <label>Address Line</label>
                    <input type="text" id="signup-restaurant-address" placeholder="address line" />
                    <label>City</label>
                    <input type="text" id="signup-restaurant-city" placeholder="city" />
                    <label>Zip Code</label>
                    <input type="text" id="signup-restaurant-zip" placeholder="6-digit zipcode" maxlength="6" />

                    <div class="address-map-container">
                        <div id="signup-restaurant-map" style="width: 100%; height: 300px; border: 1px solid #e0e0e0; border-radius: 4px; background-color: #f5f5f5; margin-top: 0.4rem;">
                            <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #999; flex-direction: column;">
                                <p>Map loading... or click "Use My Current Location" below</p>
                            </div>
                        </div>
                        <div class="restaurant-map-controls">
                            <button type="button" id="signup-detect-restaurant-location" class="btn-secondary">Use My Current Location</button>
                            <button type="button" id="signup-clear-restaurant-location" class="btn-secondary">Clear Map</button>
                        </div>
                    </div>

                    <div class="coordinate-inputs restaurant-location-grid">
                        <label>Latitude <input type="number" id="signup-restaurant-latitude" placeholder="0.0000" step="any" /></label>
                        <label>Longitude <input type="number" id="signup-restaurant-longitude" placeholder="0.0000" step="any" /></label>
                    </div>

                    <input type="hidden" id="signup-restaurant-lat" />
                    <input type="hidden" id="signup-restaurant-lng" />
                    <p id="signup-restaurant-location-text" class="hint">Location not detected yet.</p>
                </div>

                <button type="submit">Create Account</button>
                <a href="/" class="auth-link-btn btn-secondary">Back To Login</a>
            </form>
            <p class="hint">You can login from your chosen portal after successful signup.</p>
        </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="/static/js/signup.js"></script>
</body>
</html>
